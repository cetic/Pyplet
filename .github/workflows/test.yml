name: Test Suite

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver
          chromedriver --version
          chromium --version
      # - name: Debug Binary Paths
      #   run: |
      #     echo "Chromium path: $(which chromium)"
      #     echo "Chromium-browser path: $(which chromium-browser)"
      #     echo "ChromeDriver path: $(which chromedriver)"
      #     echo "CHROME_BIN env: $CHROME_BIN"
      #     echo "CHROMEDRIVER env: $CHROMEDRIVER"
      #     ls -l /usr/bin/chromium || echo "No chromium in /usr/bin"
      #     ls -l /usr/bin/chromedriver || echo "No chromedriver in /usr/bin"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest tests/ -v --cov=pyplet --cov-report=xml:coverage.xml --cov-report=term --cov-fail-under=40
        env:
          PYPLET_DEBUG: "1"
          CHROME_BIN: /usr/bin/chromium
          CHROMEDRIVER: /usr/bin/chromedriver

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            htmlcov/
            .pytest_cache/
