name: Prek checks

on:
  push:
    branches: [ main, dev ]

  pull_request:
    branches: [ main, dev ]

  workflow_dispatch:
  workflow_call:

jobs:
  prek:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: j178/prek-action@v2
