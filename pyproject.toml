[project]
name = "pyplet"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "python-minifier>=2.11.3",
    "tornado>=6.5.1",
]
authors = [
  {name = "Maxime Istasse", email = "istassem@gmail.com"},
]

[tool.setuptools]
packages = ["pyplet"]
include-package-data = true

[dependency-groups]
dev = [
    "build~=1.2.0",
    "cython>=3.1.2",
    "pyodide-build>=0.30.5",
]

examples = [
    "matplotlib>=3.10.5",
    "numpy>=2.3.2",
]

# Documentation dependencies
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.26.0",
    "pymdown-extensions>=10.7",
]

[project.scripts]
pyplet = "pyplet.server.cli:script_main"

[tool.setuptools.package-data]
# Include apps/examples into pip package
pyplet = ["../apps/**/*"]

[tool.black]
line-length = 88
target-version = ["py311"]
