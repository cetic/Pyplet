[project]
name = "pyplet"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "build~=1.2.0",
    "cython>=3.1.2",
    "pyodide-build>=0.30.5",
    "python-minifier>=2.11.3",
    "tornado>=6.5.1",
]
authors = [
  {name = "Maxime Istasse", email = "istassem@gmail.com"},
]

[dependency-groups]
examples = [
    "matplotlib>=3.10.5",
    "numpy>=2.3.2",
]

[tool.setuptools]
packages = ["pyplet"]
include-package-data = true

[project.scripts]
pyplet = "pyplet.cli:main"

[tool.setuptools.package-data]
# Include apps/examples into pip package
pyplet = ["../apps/**/*"]
