site_name: Pyplet
site_description: "Serve interactive web apps fully in Python with Pyodide + Tornado"
theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.tracking
  # Site-wide browser note (shown in the header)
  announcement: "For best results use a Chromium-based browser (Chrome, Edge, Brave). Others work but visuals/behavior may differ."
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_submodules: true
            separate_signature: true
            line_length: 88
            docstring_section_style: list
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
      restrict_base_path: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI: cli.md
  - Micro Apps: micro-apps.md
  - Tutorials:
    - Frontend-only App: tutorials/frontend-only.md
    - WebSocket App: tutorials/websocket-app.md
  - Examples:
    - Overview: examples/index.md
    - Chat: examples/chat.md
    - Dashboard: examples/dashboard.md
    - Desktop: examples/desktop.md
    - Frontend Only: examples/frontend-only.md
    - Gradient Descent Playground: examples/gradient-descent-playground.md
    - NumPy Stream: examples/numpy-stream.md
    - Sync NumPy: examples/sync-numpy.md
    - Sync Slider: examples/sync-slider.md
  - API Reference:
    - DOM: api/dom.md
    - Bootstrap Helpers: api/bootstrap.md
    - Client Runtime: api/client.md
    - Server: api/server.md
    - WebSocket Protocol: api/websocket.md
    - Client Utils: api/client-utils.md
  - Troubleshooting: troubleshooting.md
