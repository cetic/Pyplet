[project]
site_name = "Pyplet"
site_description = "Python everywhere!"

[project.theme]
variant = "modern"
features = [
    "content.code.copy",
    "navigation.sections",
    "navigation.tracking"
]
announcement = "Serve interactive web apps fully in Python with Pyodide + Tornado. For best results use a Chromium-based browser (Chrome, Edge, Brave). Others work but visuals/behavior may differ."

# Palette toggle configuration
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle = { icon = "material/brightness-auto", name = "Switch to light mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle = { icon = "material/brightness-4", name = "Switch to system preference" }

# --- Plugins ---
[plugins.search]

[plugins.mkdocstrings]
default_handler = "python"

  [plugins.mkdocstrings.handlers.python.options]
  docstring_style = "google"
  show_source = false
  show_submodules = true
  separate_signature = true
  line_length = 88
  docstring_section_style = "list"
  filters = ["!^_"]

# --- Markdown Extensions ---
[markdown_extensions.admonition]

[markdown_extensions.toc]
permalink = true

[markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[markdown_extensions."pymdownx.inlinehilite"]

[markdown_extensions."pymdownx.snippets"]
base_path = ["."]
check_paths = true
restrict_base_path = true

[markdown_extensions."pymdownx.superfences"]

# --- Navigation ---
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "CLI" = "cli.md" },
  { "Micro Apps" = "micro-apps.md" },
  { "Tutorials" = [
      { "Frontend-only App" = "tutorials/frontend-only.md" },
      { "WebSocket App" = "tutorials/websocket-app.md" }
  ]},
  { "Examples" = [
      { "Overview" = "examples/index.md" },
      { "Chat" = "examples/chat.md" },
      { "Dashboard" = "examples/dashboard.md" },
      { "Desktop" = "examples/desktop.md" },
      { "Frontend Only" = "examples/frontend-only.md" },
      { "Gradient Descent Playground" = "examples/gradient-descent-playground.md" },
      { "NumPy Stream" = "examples/numpy-stream.md" },
      { "Sync NumPy" = "examples/sync-numpy.md" },
      { "Sync Slider" = "examples/sync-slider.md" }
  ]},
  { "API Reference" = [
      { "DOM" = "api/dom.md" },
      { "Bootstrap Helpers" = "api/bootstrap.md" },
      { "Client Runtime" = "api/client.md" },
      { "Server" = "api/server.md" },
      { "WebSocket Protocol" = "api/websocket.md" },
      { "Client Utils" = "api/client-utils.md" }
  ]},
  { "Troubleshooting" = "troubleshooting.md" },
  { "License" = "../LICENSE" }
]
